<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Required for iOS to treat this like an app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <!-- Makes the iOS Safari status bar black or dark -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Tells some browsers (including Chrome for Android) the theme color -->
  <meta name="theme-color" content="#000000" />

  <!-- Tells iOS Safari that site supports dark color schemes -->
  <meta name="color-scheme" content="dark light" />

  <style>
    html, body {
      background-color: #000000;
      margin: 0;
      padding: 0;
    }
  </style>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Poczuj energię studenckiego Poznania, gdziekolwiek jesteś! #studenckienajlepsze 🧡">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Radio Meteor Player">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/Icon-192.png"/>

  <title>Radio Meteor Player</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preload" href="assets/fonts/MaterialIcons-Regular.otf" as="font" type="font/otf" crossorigin>

  <script>
    // Flutter web aggressively caches generated assets (including the
    // tree-shaken Material Icons font). If an older service worker keeps a
    // stale or partial font, Material Icon glyphs can render blank until a
    // manual hard refresh. Before booting Flutter, drop those stale font
    // entries and warm the current icon font through the network cache.
    (function () {
      const materialIconAssets = [
        'assets/FontManifest.json',
        'assets/fonts/MaterialIcons-Regular.otf',
      ];

      async function deleteStaleIconEntries() {
        if (!('caches' in window)) {
          return;
        }

        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map(async (cacheName) => {
          const cache = await caches.open(cacheName);
          const requests = await cache.keys();
          await Promise.all(requests.map((request) => {
            const url = new URL(request.url);
            const isMaterialIconAsset = materialIconAssets.some((assetPath) =>
              url.pathname.endsWith('/' + assetPath) || url.pathname.endsWith(assetPath)
            );

            return isMaterialIconAsset ? cache.delete(request) : Promise.resolve(false);
          }));
        }));
      }

      async function warmCurrentIconFont() {
        await Promise.all(materialIconAssets.map((assetPath) => {
          const assetUrl = new URL(assetPath, document.baseURI).toString();
          return fetch(assetUrl, { cache: 'reload' }).catch(() => undefined);
        }));
      }

      window.__radioMeteorPrepareFlutterAssets = async function () {
        await deleteStaleIconEntries();
        await warmCurrentIconFont();
      };
    }());
  </script>
</head>
<body>
  <script>
    (async function () {
      if (window.__radioMeteorPrepareFlutterAssets) {
        await window.__radioMeteorPrepareFlutterAssets();
      }

      const bootstrap = document.createElement('script');
      bootstrap.src = 'flutter_bootstrap.js';
      bootstrap.async = true;
      document.body.appendChild(bootstrap);
    }());
  </script>
</body>
</html>
